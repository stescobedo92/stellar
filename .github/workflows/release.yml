name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v, e.g. 0.1.0)'
        required: true

permissions:
  contents: write   # needed to create releases and push bumps
  actions: write    # needed to dispatch publish-vcpkg / publish-conan

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag:     ${{ steps.v.outputs.tag }}
      sha512:  ${{ steps.sha.outputs.sha512 }}
      tarball: ${{ steps.sha.outputs.tarball }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Resolve version
        id: v
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"

      - name: Sync version in files
        run: |
          V="${{ steps.v.outputs.version }}"
          IFS=. read -r MA MI PA <<< "$V"
          # version.hpp
          sed -i "s/^#define STELLAR_VERSION_MAJOR .*/#define STELLAR_VERSION_MAJOR ${MA}/" include/ste/version.hpp
          sed -i "s/^#define STELLAR_VERSION_MINOR .*/#define STELLAR_VERSION_MINOR ${MI}/" include/ste/version.hpp
          sed -i "s/^#define STELLAR_VERSION_PATCH .*/#define STELLAR_VERSION_PATCH ${PA}/" include/ste/version.hpp
          sed -i "s/^#define STELLAR_VERSION_STRING \".*\"/#define STELLAR_VERSION_STRING \"${V}\"/" include/ste/version.hpp
          # CMakeLists project version
          sed -i "s/VERSION [0-9]\+\.[0-9]\+\.[0-9]\+/VERSION ${V}/" CMakeLists.txt
          # conanfile.py
          sed -i "s/^    version = \".*\"/    version = \"${V}\"/" conanfile.py
          # vcpkg manifests
          sed -i "s/\"version\": \".*\"/\"version\": \"${V}\"/" packaging/vcpkg/vcpkg.json
          sed -i "s/\"version\": \".*\"/\"version\": \"${V}\"/" registry/ports/stellar/vcpkg.json

      - name: Commit version bump (if workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add include/ste/version.hpp CMakeLists.txt conanfile.py packaging/vcpkg/vcpkg.json registry/ports/stellar/vcpkg.json
          git commit -m "chore(release): bump to ${{ steps.v.outputs.version }}" || true
          git push origin HEAD:master
          git tag -f "${{ steps.v.outputs.tag }}"
          git push origin -f "${{ steps.v.outputs.tag }}"

      - name: Create source tarball
        id: sha
        run: |
          V="${{ steps.v.outputs.version }}"
          NAME="stellar-${V}"
          git archive --format=tar.gz --prefix="${NAME}/" -o "${NAME}.tar.gz" HEAD
          SHA=$(sha512sum "${NAME}.tar.gz" | awk '{print $1}')
          echo "sha512=${SHA}"           >> "$GITHUB_OUTPUT"
          echo "tarball=${NAME}.tar.gz"  >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name:     stellar ${{ steps.v.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.sha.outputs.tarball }}
          body: |
            ## stellar ${{ steps.v.outputs.version }}

            Header-only C++23 toolkit extensions.

            **Tarball SHA512**
            ```
            ${{ steps.sha.outputs.sha512 }}
            ```

            ### Install
            - vcpkg (custom registry):  see [registry/README.md](registry/README.md)
            - vcpkg (microsoft/vcpkg):  `vcpkg install stellar` (after upstream merge)
            - Conan:                    `conan install --requires=stellar/${{ steps.v.outputs.version }}`
            - CMake FetchContent:       see root [README.md](README.md)

  trigger-publish:
    name: Fan out to vcpkg / conan publish
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - name: Dispatch publish-vcpkg
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: publish-vcpkg.yml
          inputs: '{"version":"${{ needs.release.outputs.version }}","sha512":"${{ needs.release.outputs.sha512 }}"}'
      - name: Dispatch publish-conan
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: publish-conan.yml
          inputs: '{"version":"${{ needs.release.outputs.version }}"}'
